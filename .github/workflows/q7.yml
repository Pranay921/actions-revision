name: deploy

on:
  push:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: running tests
        run: npm test

  build:
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: pranay921
          password: ${{secrets.DOCKER_TOKEN}}
      
      - name: building image
        run: docker build -t pranay921/myapp:latest .

      - name: push image
        run: docker push pranay921/myapp:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: deploy application
        run: echo "Deploying application to cloud server"