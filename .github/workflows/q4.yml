name: node-app

on:
  push:

jobs:
  node-app-workflow:
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        node-version: [ 18,20 ]
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: install dependencies
        run: npm install

      - name: run tests
        run: npm test

      - name: bild the application
        run: npm run build