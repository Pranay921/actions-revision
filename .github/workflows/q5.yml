name: python-matrix
on:
  push:

jobs:
  py-mat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10","3.11" ]

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: python setup
        uses: actions/setup-python@v3
        with:
          python-version: ${{matrix.python-version}}

      - name: python version
        run: python --version